# KG Marketing — single Web Service: API + React app (landing at /)
# REQUIRED: link Postgres so DATABASE_URL is injected (see RENDER-SETUP.md)

databases:
  - name: kg-marketing-db
    plan: free
    databaseName: kg_marketing_db
    user: kg_marketing_db_user

services:
  - type: web
    name: kg-marketing
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kg-marketing-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
      - key: INIT_DB
        value: "true"
      - key: DATABASE_SSL
        value: "true"
      # Baked into Vite build — same host as API
      # Use your actual Render URL (e.g. kg-marketing-api.onrender.com)
      - key: VITE_KG_MARKETING_API_URL
        sync: false
      - key: VITE_GROK_USE_BACKEND_PROXY
        value: "true"
      # Required for live Grok (Smart Lead Finder, campaigns) — set in Render Dashboard
      - key: GROK_API_KEY_LUMEN
        sync: false
      - key: GROK_MODEL
        value: "grok-4.3"
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_ALLOWED_EMAIL_DOMAIN
        value: kgprotech.com
