# KG Marketing — Render Blueprint
# Use ONE web service for the API (backend). Deploy frontend as a separate Static Site if needed.

services:
  - type: web
    name: kg-marketing-api
    runtime: node
    plan: free
    # Leave rootDir empty — build installs backend deps explicitly
    buildCommand: cd backend && npm install --omit=dev --no-audit --no-fund
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: INIT_DB
        value: "true"
      - key: DATABASE_SSL
        value: "true"

