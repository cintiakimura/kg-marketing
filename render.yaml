# KG Marketing — single Web Service: API + React app (landing at /)

services:
  - type: web
    name: kg-marketing
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: INIT_DB
        value: "true"
      - key: DATABASE_SSL
        value: "true"
      # Baked into Vite build — same host as API
      - key: VITE_KG_MARKETING_API_URL
        value: https://kg-marketing.onrender.com
      - key: VITE_GROK_USE_BACKEND_PROXY
        value: "true"
      - key: CORS_ORIGIN
        value: https://kg-marketing.onrender.com,http://localhost:5173,http://localhost:4173
